name: WebAssembly Publish

on:
  workflow_dispatch:
    inputs:
      npm_otp:
        description: "One-time password for npm publish (optional)"
        required: false
        type: string
  release:
    types: [published]

defaults:
  run:
    working-directory: src/api/js

env:
  EM_VERSION: 3.1.73

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare for publish
        run: |
          npm version $(node -e 'console.log(fs.readFileSync("../../../.github/workflows/release.yml", "utf8").match(/RELEASE_VERSION:\s*\x27(\S+)\x27/)[1])')
          mv PUBLISHED_README.md README.md
          cp ../../../LICENSE.txt .

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          no-install: true
          version: ${{env.EM_VERSION}}
          actions-cache-folder: "emsdk-cache"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build:ts

      - name: Build wasm
        run: |
          emsdk install ${EM_VERSION}
          emsdk activate ${EM_VERSION}
          source $(dirname $(which emsdk))/emsdk_env.sh
          which node
          which clang++
          npm run build:wasm

      - name: Test
        run: npm test

      - name: Publish
        run: |
          if [ -n "${NPM_OTP}" ]; then
            echo "::add-mask::${NPM_OTP}"
          fi
          if [ -n "${NPM_OTP}" ]; then
            npm publish --otp="${NPM_OTP}"
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP: ${{ github.event.inputs.npm_otp }}
